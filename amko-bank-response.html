<script>
  const FLOW_URL = 'https://default4b7f706d9033497ab32a4d92301020.93.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4c1f0b257fa34ff3a0f5b158f4a170f8/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=KnB4wkbYOeRcotEY5nAgRNg6oHUQJ7M5B2MYJ6_7oeM';

  function getParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name) || '';
  }

  function formatCurrency(val) {
    const num = parseFloat(val);
    if (isNaN(num)) return val;
    return '$' + num.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  window.addEventListener('DOMContentLoaded', () => {
    const requestID = getParam('requestID');
    const entityName = getParam('entityName');
    const leaseAmount = getParam('leaseAmount');
    const leaseTerm = getParam('leaseTerm');
    const leasePurpose = getParam('leasePurpose');
    const responseDeadline = getParam('responseDeadline');

    document.getElementById('dRequestID').textContent = requestID || '—';
    document.getElementById('dEntityName').textContent = entityName || '—';
    document.getElementById('dLeaseAmount').textContent = leaseAmount ? formatCurrency(leaseAmount) : '—';
    document.getElementById('dLeaseTerm').textContent = leaseTerm ? leaseTerm + ' years' : '—';
    document.getElementById('dLeasePurpose').textContent = leasePurpose || '—';
  });

  function fChk(elId, fgId) {
    const el = document.getElementById(elId);
    const fg = document.getElementById(fgId);
    if (!el || !fg) return true;
    if (!el.value.trim()) { fg.classList.add('herr'); return false; }
    fg.classList.remove('herr');
    return true;
  }

  function fSubmit() {
    let ok = true;
    if (!fChk('fBankName', 'ffg-bankName')) ok = false;
    if (!fChk('fContactName', 'ffg-contactName')) ok = false;
    if (!fChk('fContactEmail', 'ffg-contactEmail')) ok = false;
    if (!fChk('fContactPhone', 'ffg-contactPhone')) ok = false;

    const rate = document.getElementById('fRate').value;
    const rateErr = document.getElementById('rateErr');
    if (!rate || isNaN(parseFloat(rate)) || parseFloat(rate) <= 0) {
      rateErr.style.display = 'block';
      ok = false;
    } else {
      rateErr.style.display = 'none';
    }

    if (!ok) return;

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Submitting...';
    btn.disabled = true;

    const payload = {
      requestID: getParam('requestID'),
      entityName: getParam('entityName'),
      leaseAmount: getParam('leaseAmount'),
      leaseTerm: getParam('leaseTerm'),
      leasePurpose: getParam('leasePurpose'),
      responseDeadline: getParam('responseDeadline'),
      bankName: document.getElementById('fBankName').value,
      contactName: document.getElementById('fContactName').value,
      contactEmail: document.getElementById('fContactEmail').value,
      contactPhone: document.getElementById('fContactPhone').value,
      proposedRate: document.getElementById('fRate').value,
      notes: document.getElementById('fNotes').value
    };

    fetch(FLOW_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => {
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('formContent2').style.display = 'none';
      document.getElementById('formContent3').style.display = 'none';
      document.getElementById('successBox').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    })
    .catch(() => {
      btn.textContent = 'Submit Rate Bid →';
      btn.disabled = false;
      alert('There was an error submitting your bid. Please try again or contact AMKO Capital at info@amkocap.com');
    });
  }
</script>
